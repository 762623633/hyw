<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的网页</title>
    <meta name="description" content="这是一个网站开发示例。" />
    <meta name="keywords" content="网站开发，前端" />
    <meta name="author" content="李昱璋" />
    <meta name="robots" content="index, follow" />

    <style>
      body {
        background-color: #f4f4f4;
        margin: 0;
        padding: 20px;
        font-family: "Microsoft YaHei", Arial, sans-serif;
        color: #333;
        line-height: 1.6;
      }

      header {
        background-color: #35424a;
        color: white;
        padding: 20px 0;
        text-align: center;
        margin-bottom: 20px;
        border-radius: 5px;
      }

      header h1 {
        margin: 0;
        font-size: 2.5em;
      }

      main {
        background-color: white;
        padding: 30px;
        border-radius: 5px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        max-width: 800px;
        margin: 0 auto;
      }

      main p {
        font-size: 1.1em;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>欢迎来到我的网站</h1>
    </header>
    <main>
      <p>这是页面的主要内容。请在此处添加您的实际内容。</p>
    </main>
  </body>
</html>
